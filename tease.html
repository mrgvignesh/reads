<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Rogue Algorithm: Logic Cadence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <div x-data="game()" class="max-w-4xl mx-auto px-4 py-12">
        <header class="text-center mb-8">
            <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-4">
                The Rogue Algorithm
            </h1>
            
            <div class="inline-grid grid-cols-1 md:grid-cols-3 gap-4 bg-slate-800/50 border border-slate-700 p-4 rounded-xl text-sm text-left max-w-2xl mx-auto mb-8">
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]"></span>
                    <span><strong>The Bayesian:</strong> $P(\text{Truth}) = 1.0$</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_#ef4444]"></span>
                    <span><strong>The Overfitter:</strong> $P(\text{Truth}) = 0.0$</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-amber-500 shadow-[0_0_10px_#f59e0b]"></span>
                    <span><strong>Stochastic Node:</strong> $P(\text{Truth}) = 0.5$</span>
                </div>
            </div>
        </header>

        <div class="bg-slate-800 border border-slate-700 rounded-2xl shadow-2xl p-8 relative overflow-hidden">
            
            <div x-show="!finished">
                <div class="flex justify-between items-end mb-2">
                    <span class="text-xs font-mono text-slate-500" x-text="`ITERATION: ${step + 1}/10` text-align: left"></span>
                    <span class="text-xs font-mono text-slate-500" x-text="`ACCURACY: ${score}/${step}` text-align: right"></span>
                </div>
                <div class="w-full bg-slate-700 h-1.5 rounded-full mb-8">
                    <div class="bg-blue-500 h-1.5 rounded-full transition-all duration-700" :style="`width: ${(step + 1) * 10}%` text-align: right"></div>
                </div>

                <div class="mb-10 text-xl font-light text-slate-200 leading-relaxed italic">
                    "<span x-text="questions[step].scenario"></span>"
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                    <template x-for="(agent, index) in ['A', 'B', 'C']">
                        <div class="group flex flex-col items-center p-6 bg-slate-900/40 rounded-2xl border border-slate-700 hover:border-blue-500/50 transition-colors">
                            <img :src="`https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${agent}${step}&backgroundColor=0f172a`" 
                                 class="w-20 h-20 mb-4 drop-shadow-2xl" alt="Agent">
                            <h3 class="font-bold text-xs tracking-widest uppercase text-slate-500 mb-3" x-text="`Agent ${agent}`"></h3>
                            <p class="text-center text-sm font-medium text-slate-300" x-text="`“${questions[step].dialogue[index]}”`"></p>
                        </div>
                    </template>
                </div>

                <div class="text-center border-t border-slate-700 pt-8">
                    <h2 class="text-lg font-semibold mb-6 text-blue-100" x-text="questions[step].question"></h2>
                    
                    <div class="flex flex-wrap justify-center gap-3" x-show="!revealed">
                        <template x-for="option in ['Agent A', 'Agent B', 'Agent C']">
                            <button @click="reveal(option)" 
                                    class="px-8 py-3 bg-slate-700 hover:bg-blue-600 rounded-xl font-bold transition-all transform hover:-translate-y-1 active:scale-95">
                                <span x-text="option"></span>
                            </button>
                        </template>
                    </div>

                    <div x-show="revealed" x-transition.opacity class="mt-4 p-6 bg-slate-900/80 border border-blue-500/20 rounded-xl">
                        <div class="flex items-center justify-center gap-2 mb-3">
                            <template x-if="correct">
                                <span class="text-emerald-400 font-bold">● SYSTEM NOMINAL (Correct)</span>
                            </template>
                            <template x-if="!correct">
                                <span class="text-red-400 font-bold">● LOGIC ERROR (Incorrect)</span>
                            </template>
                        </div>
                        <p class="text-slate-400 text-sm leading-relaxed mb-6 max-w-md mx-auto" x-text="questions[step].logic"></p>
                        <button @click="nextStep()" class="px-10 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-500 shadow-lg shadow-blue-900/20">
                            Continue →
                        </button>
                    </div>
                </div>
            </div>

            <div x-show="finished" class="text-center py-16">
                <div class="inline-block p-4 rounded-full bg-blue-500/10 mb-6">
                    <svg class="w-16 h-16 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <h2 class="text-4xl font-bold mb-2 text-white">Analysis Complete</h2>
                <p class="text-slate-400 mb-8 font-mono">Final Model Accuracy: <span class="text-blue-400" x-text="`${score * 10}%` text-align: right"></span></p>
                <button @click="location.reload()" class="px-10 py-4 bg-slate-100 text-slate-900 rounded-xl font-extrabold hover:bg-white transition-all">
                    Restart Cadence
                </button>
            </div>
        </div>
    </div>

    <script>
        function game() {
            return {
                step: 0,
                score: 0,
                revealed: false,
                correct: false,
                finished: false,
                // COPY AND PASTE THE 10 QUESTIONS FROM THE PREVIOUS RESPONSE HERE
                questions: [
    {
        scenario: "The model is hallucinating. You ask the agents: 'Who is the Stochastic Node?'",
        dialogue: ["Agent B is the Overfitter.", "I am the Stochastic Node.", "Agent A is the Bayesian."],
        question: "Who is the Bayesian?",
        answer: "Agent B",
        logic: "If Agent B says 'I am the Stochastic Node' and they were the Bayesian, they'd be lying (impossible). If they were the Overfitter, they'd be telling the truth (impossible). Therefore, Agent B is the Stochastic Node. Following that, Agent A must be the Overfitter and Agent C is the Bayesian."
    },
    {
        scenario: "A suspected data leak has occurred. You ask Agent A for their identity.",
        dialogue: ["I am not the Bayesian.", "Agent A is telling the truth.", "Agent A is the Overfitter."],
        question: "Who is Agent A?",
        answer: "Agent A",
        logic: "A Bayesian cannot say 'I am not a Bayesian' (that would be a lie). An Overfitter cannot say 'I am not a Bayesian' (that would be the truth). Thus, Agent A must be the Stochastic Node."
    },
    {
        scenario: "The training loss is 0, but validation loss is infinite. You ask: 'Is Agent B the Bayesian?'",
        dialogue: ["Agent B is the Bayesian.", "Agent C is the Overfitter.", "Agent A is the Overfitter."],
        question: "Who is the Bayesian?",
        answer: "Agent B",
        logic: "If B is the Bayesian, then C is the Overfitter. This makes A's statement ('C is the Overfitter') a truth. Since we only have one Bayesian, A must be the Stochastic Node. This configuration works."
    },
    {
        scenario: "The agents are arguing about the Null Hypothesis.",
        dialogue: ["Agent B always lies.", "Agent C always lies.", "Agent A and Agent B are both lying right now."],
        question: "Who is the Bayesian?",
        answer: "Agent B",
        logic: "If A is the Bayesian, B is the Overfitter (True). If B is the Overfitter, C is the Bayesian (Wait, that's two Bayesians). If B is the Bayesian, then C is the Overfitter. If C is the Overfitter, his claim that A and B are lying is a lie (because B is telling the truth). This holds."
    },
    {
        scenario: "A $p$-value of 0.04 appears. The Bayesian knows the Null should be rejected. You ask about the result.",
        dialogue: ["The $p$-value is 0.06. Fail to reject.", "Agent A is the Overfitter.", "The $p$-value is 0.04. Reject."],
        question: "Who is the Stochastic Node?",
        answer: "Agent A",
        logic: "If C is the Bayesian (Truth), then A is lying. If A is lying, B's statement that A is the Overfitter could be true. If B is the Bayesian, C must be Stochastic. If C is the Bayesian, A is the Stochastic Node."
    },
    {
        scenario: "Checking for feature importance. You know 'User_ID' is a junk feature.",
        dialogue: ["'User_ID' has the highest SHAP value.", "Agent A is lying.", "I am the Bayesian."],
        question: "If Agent B is the Stochastic Node, who is the Overfitter?",
        answer: "Agent A",
        logic: "If Agent A says a junk feature is the most important, they are lying. Since B is Stochastic and we need a Bayesian, Agent C must be the Bayesian. That leaves Agent A as the Overfitter."
    },
    {
        scenario: "The agents are discussing their own programming.",
        dialogue: ["Agent C is the Bayesian.", "I am the Overfitter.", "Agent B is the Stochastic Node."],
        question: "Who is the Bayesian?",
        answer: "Agent C",
        logic: "Agent B cannot be the Overfitter (he'd be telling the truth) and cannot be the Bayesian (he'd be lying). So B is the Stochastic Node. This makes C's statement true. C is the Bayesian."
    },
    {
        scenario: "The 'Meta-Logic' Test: You ask Agent A what Agent B would say.",
        dialogue: ["Agent B would say I am the Overfitter.", "Agent C is the Stochastic Node.", "I am the Bayesian."],
        question: "If Agent A is the Bayesian, what is Agent B?",
        answer: "Agent B", 
        logic: "If A is the Bayesian, he must tell the truth about what B would say. For B (the Overfitter) to call A (the Bayesian) an Overfitter, B must lie. This is a consistent state."
    },
    {
        scenario: "The Probability Cloud: You ask about the likelihood of identities.",
        dialogue: ["There is a 50% chance Agent B is the Bayesian.", "There is a 0% chance Agent A is the Bayesian.", "Statement B is true."],
        question: "If Agent C is the Bayesian, who is the Overfitter?",
        answer: "Agent B",
        logic: "If C is the Bayesian, then B's statement is true. But if B's statement is true, B cannot be the Overfitter... Wait! If B's statement is 0%, and A IS the Bayesian, B is lying. If B is the Overfitter, his 0% claim is a lie because the chance is actually 100%."
    },
    {
        scenario: "The Final Deployment. You need to pick the right Agent to push to Production.",
        dialogue: ["If you ask Agent B if he is the Bayesian, he will say 'Yes'.", "Agent C is the Bayesian.", "I am the Stochastic Node."],
        question: "If Agent B is the Overfitter, who is the Bayesian?",
        answer: "Agent A",
        logic: "If B is the Overfitter, he would indeed say 'Yes' to being the Bayesian (a lie). Since Agent A predicted this accurately, Agent A is the Bayesian. Agent C is the Stochastic Node."
    }
],
                reveal(choice) {
                    this.revealed = true;
                    this.correct = (choice === this.questions[this.step].answer);
                    if(this.correct) this.score++;
                },
                nextStep() {
                    if (this.step < this.questions.length - 1) {
                        this.step++;
                        this.revealed = false;
                    } else {
                        this.finished = true;
                        confetti({
                            particleCount: 150,
                            spread: 70,
                            origin: { y: 0.6 },
                            colors: ['#60a5fa', '#10b981', '#ffffff']
                        });
                    }
                }
            }
        }
    </script>
</body></html>
